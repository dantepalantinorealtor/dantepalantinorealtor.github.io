<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Intake — Palantino Real Estate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="../assets/logo-key.png" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B1A2E;
    --bg-2: #0E2138;
    --bg-sidebar: #091627;
    --gold: #D4B57F;
    --gold-soft: rgba(212, 181, 127, 0.18);
    --gold-line: rgba(212, 181, 127, 0.28);
    --gold-deep: #B8965E;
    --ivory: #F0E9DC;
    --text: #E9E4DA;
    --muted: rgba(233, 228, 218, 0.55);
    --faint: rgba(233, 228, 218, 0.32);
    --rule: rgba(233, 228, 218, 0.08);
    --rule-strong: rgba(233, 228, 218, 0.16);
    --card: rgba(255, 255, 255, 0.035);
    --error: #E08C7A;
    --error-soft: rgba(224, 140, 122, 0.12);
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  ::selection { background: var(--gold); color: var(--bg); }

  /* ---------- LAYOUT ---------- */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--rule);
    padding: 48px 40px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .sb-brand {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .sb-lockup {
    height: 56px;
    width: auto;
    align-self: flex-start;
    object-fit: contain;
    object-position: left center;
  }
  .sb-back {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--faint);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.25s ease;
  }
  .sb-back:hover { color: var(--gold); }
  .sb-back::before { content: '←'; font-size: 14px; line-height: 1; }

  .sb-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sb-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sb-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 32px;
    line-height: 1.15;
    color: var(--ivory);
  }

  .sb-progress {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
  }
  .sb-step {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 12px;
    padding: 10px 0;
    cursor: pointer;
    position: relative;
    transition: opacity 0.25s ease;
  }
  .sb-step[data-locked="true"] {
    cursor: default;
    opacity: 0.5;
  }
  .sb-step-marker {
    display: grid;
    place-items: center;
    position: relative;
  }
  .sb-step-dot {
    width: 10px;
    height: 10px;
    border: 1.5px solid var(--rule-strong);
    border-radius: 50%;
    background: transparent;
    transition: all 0.3s ease;
  }
  .sb-step[data-status="done"] .sb-step-dot {
    background: var(--gold);
    border-color: var(--gold);
  }
  .sb-step[data-status="current"] .sb-step-dot {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px var(--gold-soft);
    background: var(--bg-sidebar);
  }
  /* connecting line */
  .sb-step:not(:last-child) .sb-step-marker::after {
    content: '';
    position: absolute;
    top: 24px;
    bottom: -8px;
    width: 1px;
    background: var(--rule-strong);
  }
  .sb-step[data-status="done"]:not(:last-child) .sb-step-marker::after {
    background: var(--gold-line);
  }
  .sb-step-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 1px;
  }
  .sb-step-num {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .sb-step[data-status="current"] .sb-step-num,
  .sb-step[data-status="done"] .sb-step-num {
    color: var(--gold);
  }
  .sb-step-title {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--muted);
    line-height: 1.3;
    transition: color 0.25s ease;
  }
  .sb-step[data-status="current"] .sb-step-title,
  .sb-step[data-status="done"] .sb-step-title {
    color: var(--ivory);
  }
  .sb-step[data-status="current"] .sb-step-title {
    font-style: italic;
  }
  .sb-step:not([data-locked="true"]):hover .sb-step-title {
    color: var(--text);
  }

  .sb-foot {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sb-foot-tag {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--faint);
    line-height: 1.5;
  }
  .sb-foot-saved {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sb-foot-saved::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 0 4px var(--gold-soft);
  }

  /* ---------- MAIN ---------- */
  .main {
    padding: 80px 64px 64px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }

  /* watermark */
  .main::before {
    content: '';
    position: absolute;
    right: -120px;
    top: 40px;
    width: 520px;
    height: 520px;
    opacity: 0.04;
    pointer-events: none;
    background: url('../assets/logo-key.png') no-repeat center center;
    background-size: contain;
    z-index: 0;
  }

  .main-inner {
    position: relative;
    z-index: 1;
  }

  /* ---------- CHOOSER ---------- */
  .chooser { padding-top: 40px; }
  .chooser-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .chooser-eyebrow::before {
    content: ''; display: block;
    width: 28px; height: 1px; background: var(--gold);
  }
  .chooser-title {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 400;
    line-height: 1.05;
    color: var(--ivory);
    margin-bottom: 18px;
  }
  .chooser-title em { font-style: italic; color: var(--gold); }
  .chooser-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 520px;
    margin-bottom: 56px;
  }
  .chooser-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .chooser-card {
    border: 1px solid var(--gold-line);
    background: var(--card);
    padding: 36px 32px 32px;
    cursor: pointer;
    text-align: left;
    color: inherit;
    font-family: inherit;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .chooser-card:hover {
    background: rgba(212, 181, 127, 0.06);
    transform: translateY(-2px);
    border-color: var(--gold);
  }
  .chooser-card-glyph {
    font-family: var(--serif);
    font-style: italic;
    font-size: 44px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 24px;
    display: block;
  }
  .chooser-card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .chooser-card-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    color: var(--ivory);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .chooser-card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .chooser-card-arrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: gap 0.3s ease;
  }
  .chooser-card-arrow::after { content: '→'; font-size: 14px; line-height: 1; }
  .chooser-card:hover .chooser-card-arrow { gap: 16px; }

  .chooser-resume {
    margin-top: 40px;
    padding: 20px 24px;
    border: 1px solid var(--gold-line);
    background: var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .chooser-resume-text {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ivory);
  }
  .chooser-resume-text strong {
    font-style: normal;
    font-weight: 600;
    color: var(--gold);
  }
  .chooser-resume-actions {
    display: flex;
    gap: 12px;
  }
  .resume-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 10px 18px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease;
  }
  .resume-btn:hover { background: var(--ivory); }
  .resume-btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule-strong);
  }
  .resume-btn.ghost:hover { color: var(--gold); border-color: var(--gold-line); }

  /* ---------- FORM STEP ---------- */
  .step-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .step-eyebrow::before {
    content: ''; display: block;
    width: 28px; height: 1px; background: var(--gold);
  }
  .step-title {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 400;
    line-height: 1.1;
    color: var(--ivory);
    margin-bottom: 14px;
  }
  .step-title em { font-style: italic; color: var(--gold); }
  .step-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 540px;
    margin-bottom: 48px;
  }

  /* ---------- FIELDS ---------- */
  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 24px;
    margin-bottom: 40px;
  }
  .field-grid .field.full { grid-column: 1 / -1; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .field-label .req {
    color: var(--gold);
    font-size: 11px;
  }
  .field-help {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--faint);
    line-height: 1.5;
    margin-top: -2px;
  }
  .field-input,
  .field-textarea {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--rule-strong);
    padding: 10px 0 12px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 400;
    color: var(--ivory);
    width: 100%;
    transition: border-color 0.25s ease;
    outline: none;
  }
  .field-input::placeholder,
  .field-textarea::placeholder {
    color: var(--faint);
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
  }
  .field-input:focus,
  .field-textarea:focus {
    border-color: var(--gold);
  }
  .field-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.55;
    padding: 12px 0;
  }

  .field.has-error .field-input,
  .field.has-error .field-textarea {
    border-color: var(--error);
  }
  .field-error {
    font-size: 12px;
    color: var(--error);
    line-height: 1.4;
    display: none;
  }
  .field.has-error .field-error { display: block; }

  /* Radio group */
  .field-radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .field-radio-group.horizontal {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
  }
  .radio-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border: 1px solid var(--rule-strong);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    background: transparent;
    font-family: inherit;
    color: var(--text);
    text-align: left;
    width: 100%;
  }
  .field-radio-group.horizontal .radio-opt { width: auto; }
  .radio-opt:hover { border-color: var(--gold-line); }
  .radio-opt.selected {
    border-color: var(--gold);
    background: var(--gold-soft);
  }
  .radio-opt-dot {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--rule-strong);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: border-color 0.25s ease;
  }
  .radio-opt.selected .radio-opt-dot {
    border-color: var(--gold);
  }
  .radio-opt.selected .radio-opt-dot::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--gold);
    border-radius: 50%;
  }
  .radio-opt-label {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
  }
  .radio-opt.selected .radio-opt-label {
    color: var(--ivory);
  }

  /* "Other" input that appears when selected */
  .radio-other-input {
    margin-top: 12px;
    display: none;
  }
  .radio-other-input.active {
    display: block;
  }

  /* ---------- ACTIONS ---------- */
  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    gap: 16px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 16px 36px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .btn-primary::after { content: '→'; font-size: 14px; line-height: 1; }
  .btn-primary:hover:not(:disabled) {
    background: var(--ivory);
    transform: translateX(2px);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary.submit::after { content: '✓'; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 14px 4px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .btn-ghost::before { content: '←'; font-size: 14px; line-height: 1; }
  .btn-ghost:hover { color: var(--gold); }
  .btn-ghost.hidden { visibility: hidden; }

  /* ---------- REVIEW ---------- */
  .review-section {
    margin-bottom: 32px;
    border: 1px solid var(--rule);
    padding: 24px 28px;
  }
  .review-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
  }
  .review-section-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--ivory);
  }
  .review-edit {
    background: transparent;
    border: none;
    color: var(--gold);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
  }
  .review-edit:hover { color: var(--ivory); }
  .review-rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .review-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .review-row:last-child {
    padding-bottom: 0;
    border-bottom: none;
  }
  .review-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.5;
  }
  .review-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .review-value.empty {
    color: var(--faint);
    font-family: var(--serif);
    font-style: italic;
  }

  /* ---------- SUBMIT / SUCCESS ---------- */
  .submit-state {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
  }
  .submit-state.error { color: var(--error); }

  .success {
    text-align: center;
    padding: 80px 0 40px;
  }
  .success-glyph {
    font-family: var(--serif);
    font-style: italic;
    font-size: 100px;
    line-height: 1;
    color: var(--gold);
    margin-bottom: 28px;
  }
  .success-title {
    font-family: var(--serif);
    font-size: 52px;
    font-weight: 400;
    line-height: 1.1;
    color: var(--ivory);
    margin-bottom: 18px;
  }
  .success-title em { font-style: italic; color: var(--gold); }
  .success-lede {
    font-family: var(--serif);
    font-style: italic;
    font-size: 19px;
    line-height: 1.6;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto 40px;
  }
  .success-actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .success-actions a {
    color: var(--gold);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    border: 1px solid var(--gold-line);
    padding: 14px 24px;
    transition: all 0.25s ease;
  }
  .success-actions a:hover {
    background: var(--gold);
    color: var(--bg);
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative;
      height: auto;
      padding: 32px 32px 24px;
      border-right: none;
      border-bottom: 1px solid var(--rule);
    }
    .sb-foot { display: none; }
    .main { padding: 48px 32px; }
    .step-title, .chooser-title { font-size: 36px; }
    .field-grid { grid-template-columns: 1fr; }
    .chooser-grid { grid-template-columns: 1fr; }
    .review-row { grid-template-columns: 1fr; gap: 4px; }
  }
  @media (max-width: 520px) {
    .main { padding: 32px 22px; }
    .sidebar { padding: 24px 22px; }
    .step-title, .chooser-title { font-size: 30px; }
    .actions { flex-direction: column-reverse; align-items: stretch; }
    .btn-primary, .btn-ghost { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <!-- rendered by JS -->
  </aside>

  <main class="main">
